<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Créer un Bin — jsonbin.io</title>
<style>
  body{font-family:-apple-system,sans-serif;background:#0a0e14;color:#cfe7ee;margin:0;padding:24px 18px;}
  h1{font-size:18px;color:#00f0ff;margin-bottom:4px;}
  p{color:#6f8a99;font-size:13px;line-height:1.5;}
  label{display:block;margin-top:18px;font-size:13px;color:#cfe7ee;font-weight:600;}
  input{width:100%;box-sizing:border-box;padding:12px;margin-top:6px;background:#0d1622;border:1px solid #1c2c3d;border-radius:8px;color:#fff;font-size:15px;}
  button{width:100%;margin-top:20px;padding:14px;background:#00f0ff;color:#04141a;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
  button:disabled{opacity:.5;}
  #result{margin-top:20px;padding:14px;border-radius:8px;font-size:14px;word-break:break-all;display:none;}
  #result.ok{background:rgba(39,224,160,.12);border:1px solid #27e0a0;color:#aef6da;}
  #result.err{background:rgba(255,59,92,.1);border:1px solid #ff3b5c;color:#ffc2cd;}
  .id{font-family:monospace;font-size:18px;font-weight:700;display:block;margin-top:6px;user-select:all;}
</style>
</head>
<body>
  <h1>Créer un Bin vide</h1>
  <p>Colle ta X-Master-Key jsonbin (celle de l'app CyberQuest). Rien n'est envoyé ailleurs que jsonbin.io — tout se passe dans ce navigateur.</p>

  <label>X-Master-Key</label>
  <input type="password" id="key" placeholder="$2a$10$...">

  <button id="btn">Créer le bin</button>

  <div id="result"></div>

<script>
document.getElementById('btn').addEventListener('click', async ()=>{
  const key = document.getElementById('key').value.trim();
  const result = document.getElementById('result');
  const btn = document.getElementById('btn');
  if(!key){ alert('Colle ta clé d\'abord'); return; }

  btn.disabled = true; btn.textContent = 'Création...';
  result.style.display='none';

  try{
    const res = await fetch('https://api.jsonbin.io/v3/b', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'X-Master-Key': key,
        'X-Bin-Name': 'cyberquest-classement'
      },
      body: JSON.stringify({ "init": true })
    });
    const data = await res.json();
    if(!res.ok){ throw new Error('HTTP '+res.status+' — '+JSON.stringify(data)); }

    const binId = data?.metadata?.id || data?.id || '(introuvable dans la réponse, voir brut ci-dessous)';
    result.className='ok';
    result.innerHTML = 'Bin créé ✅<span class="id">'+binId+'</span><br><br><small>'+JSON.stringify(data)+'</small>';
    result.style.display='block';
  }catch(err){
    result.className='err';
    result.textContent = 'Erreur : ' + err.message;
    result.style.display='block';
  }finally{
    btn.disabled = false; btn.textContent = 'Créer le bin';
  }
});
</script>
</body>
</html>
