<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CyberQuest VR</title>
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#060a10">
<style>
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;background:#060a10 !important;font-family:sans-serif;color:#cfe7ee}
    canvas{display:block}
    #loading{position:fixed;inset:0;z-index:500;background:#060a10;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .load-logo{font-family:monospace;font-size:28px;color:#00f0ff;margin-bottom:8px}.load-logo b{color:#ff2ecb}
    .load-sub{font-family:monospace;font-size:12px;color:#6f8a99;margin-bottom:24px}
    .load-bar{width:200px;height:4px;background:#1c2c3d;border-radius:2px;overflow:hidden}
    .load-fill{height:100%;width:0%;background:linear-gradient(90deg,#00f0ff,#ff2ecb)}
</style>
</head>
<body>
    <div id="loading">
        <div class="load-logo">Cyber<b>Quest</b></div>
        <div class="load-sub">INITIALISATION...</div>
        <div class="load-bar"><div class="load-fill"></div></div>
    </div>
</body>
</html>
